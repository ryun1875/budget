<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>명조 매트릭스 파티 편성</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css">
<style>
:root{
  --bg:#0f1117;--bg2:#171a23;--bg3:#1e2130;--bg4:#242838;
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.13);
  --text:#e8eaf0;--text2:#8b90a0;--text3:#555a6a;
  --accent:#6c8ef5;--accent2:#4f6fe0;
  --gold:#f0b429;--red:#e24b4a;
  --radius:10px;--radius2:16px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
#loginScreen{display:flex;align-items:center;justify-content:center;min-height:100vh}
.login-box{background:var(--bg2);border:0.5px solid var(--border2);border-radius:var(--radius2);padding:40px;text-align:center;max-width:340px;width:90%}
.login-box h1{font-size:22px;font-weight:700;margin-bottom:6px}
.login-box p{font-size:13px;color:var(--text2);margin-bottom:28px;line-height:1.6}
.google-btn{display:inline-flex;align-items:center;gap:10px;padding:12px 24px;background:#fff;color:#333;border:none;border-radius:8px;font-size:14px;font-weight:500;cursor:pointer}
.google-btn:hover{opacity:.88}
.google-btn img{width:20px;height:20px}
#app{display:none;max-width:980px;margin:0 auto;padding:16px 14px 60px}
.btn{padding:7px 13px;border:0.5px solid var(--border2);border-radius:var(--radius);background:var(--bg2);color:var(--text);font-size:13px;cursor:pointer;display:inline-flex;align-items:center;gap:5px;font-family:inherit;transition:background .15s}
.btn:hover{background:var(--bg3)}
.btn-accent{background:var(--accent2);border-color:var(--accent);color:#fff}
.btn-accent:hover{background:var(--accent)}
.btn-sm{padding:4px 9px;font-size:12px}
.btn-icon{padding:5px 7px}
.field{border:0.5px solid var(--border2);border-radius:7px;padding:6px 10px;font-size:13px;background:var(--bg3);color:var(--text);width:100%;font-family:inherit}
.field:focus{outline:none;border-color:var(--accent)}
.textarea{border:0.5px solid var(--border2);border-radius:7px;padding:8px 10px;font-size:13px;background:var(--bg3);color:var(--text);width:100%;resize:vertical;min-height:80px;font-family:inherit;line-height:1.6}
.textarea:focus{outline:none;border-color:var(--accent)}
.sec-title{font-size:12px;font-weight:500;color:var(--text2);margin:0 0 8px;display:flex;align-items:center;gap:6px}
.sec-title::after{content:'';flex:1;height:0.5px;background:var(--border)}
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:100;align-items:center;justify-content:center;padding:16px}
.modal-bg.open{display:flex}
.modal{background:var(--bg2);border-radius:var(--radius2);border:0.5px solid var(--border2);padding:1.25rem;width:100%;max-width:420px;max-height:90vh;overflow-y:auto}
.modal-sm{background:var(--bg2);border-radius:var(--radius2);border:0.5px solid var(--border2);padding:1.25rem;width:100%;max-width:340px;max-height:90vh;overflow-y:auto}
.modal-title{font-size:16px;font-weight:600}
.tab-bar{display:flex;border-bottom:0.5px solid var(--border);margin-bottom:1rem}
.tab{padding:6px 11px;font-size:13px;cursor:pointer;border:none;border-bottom:2px solid transparent;color:var(--text2);background:none;font-family:inherit}
.tab.active{border-bottom-color:var(--accent);color:var(--text);font-weight:500}
.pane{display:none}.pane.active{display:block}
.toast{position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%);background:#1a1d2a;color:var(--text);border:0.5px solid var(--border2);padding:8px 18px;border-radius:var(--radius);font-size:13px;z-index:300;opacity:0;transition:opacity .25s;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}
/* top */
.top-bar{display:flex;align-items:center;gap:8px;margin-bottom:16px;flex-wrap:wrap}
.top-bar h1{font-size:17px;font-weight:700;flex:1;min-width:0}
.user-avatar{width:26px;height:26px;border-radius:50%;object-fit:cover}
/* season bar */
.season-bar{display:flex;align-items:center;gap:6px;margin-bottom:16px;overflow-x:auto;padding-bottom:2px;flex-wrap:wrap}
.s-tab{padding:5px 14px;border:0.5px solid var(--border2);border-radius:20px;font-size:13px;cursor:pointer;background:var(--bg3);color:var(--text2);white-space:nowrap;font-family:inherit;flex-shrink:0;transition:all .15s}
.s-tab:hover{color:var(--text)}
.s-tab.active{background:var(--accent2);border-color:var(--accent);color:#fff;font-weight:500}
/* layout */
.main-layout{display:grid;grid-template-columns:1fr 270px;gap:14px}
@media(max-width:680px){.main-layout{grid-template-columns:1fr}}
.left-col{min-width:0}
.right-col{display:flex;flex-direction:column;gap:14px}
/* char grid */
.char-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(63px,1fr));gap:6px;margin-bottom:12px}
.char-card{border:0.5px solid var(--border);border-radius:var(--radius);text-align:center;cursor:pointer;background:var(--bg2);user-select:none;position:relative;overflow:hidden;transition:border-color .15s}
.char-card:hover{border-color:var(--border2)}
.char-card.star5{border-color:rgba(240,180,41,0.35)}
.char-card.star5:hover{border-color:var(--gold)}
.char-card.exhausted{opacity:0.28}
.portrait-wrap{width:100%;aspect-ratio:1;position:relative;overflow:hidden}
.attr-badge{position:absolute;bottom:2px;right:2px;font-size:9px;font-weight:500;padding:1px 4px;border-radius:3px;line-height:14px;z-index:2}
.memo-dot{position:absolute;top:3px;right:3px;width:6px;height:6px;border-radius:50%;background:var(--accent);z-index:3}
.dupe-tag{position:absolute;top:2px;left:2px;font-size:9px;background:var(--accent2);color:#fff;border-radius:3px;padding:0 3px;line-height:15px;z-index:3}
.star5-corner{position:absolute;top:0;right:0;width:0;height:0;border-style:solid;border-width:0 13px 13px 0;border-color:transparent var(--gold) transparent transparent;z-index:2}
.char-name{font-size:10px;color:var(--text);padding:3px 2px;line-height:1.2;word-break:keep-all}
/* parties */
.parties-area{display:flex;flex-direction:column;gap:10px}
.party-row{background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--radius2);padding:11px 13px}
.party-header{display:flex;align-items:center;gap:7px;margin-bottom:8px;flex-wrap:wrap}
.party-name-input{border:0.5px solid var(--border);border-radius:7px;padding:3px 8px;font-size:13px;background:var(--bg3);color:var(--text);width:110px;font-family:inherit}
.party-name-input:focus{outline:none;border-color:var(--border2)}
.buff-sel{border:0.5px solid var(--border);border-radius:7px;padding:3px 7px;font-size:12px;background:var(--bg3);color:var(--text2);font-family:inherit;cursor:pointer;max-width:120px}
.buff-sel:focus{outline:none;border-color:var(--accent)}
.rm-party{margin-left:auto;background:none;border:none;cursor:pointer;color:var(--text3);padding:2px 4px;font-size:14px}
.rm-party:hover{color:var(--red)}
.slots{display:flex;gap:7px;flex-wrap:wrap}
.slot{width:70px;min-height:90px;border:1.5px dashed rgba(255,255,255,0.1);border-radius:var(--radius);display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;background:var(--bg3);position:relative;overflow:hidden;transition:border-color .15s}
.slot:hover{border-color:var(--border2)}
.slot.filled{border-style:solid;border-color:var(--border);background:var(--bg2)}
.slot.filled.is5{border-color:rgba(240,180,41,0.4)}
.slot-portrait{width:100%;height:62px;overflow:hidden;position:relative}
.slot-name{font-size:10px;text-align:center;padding:2px 2px 1px;line-height:1.2;width:100%}
.slot-memo{font-size:9px;color:var(--text3);text-align:center;padding:0 3px 3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;width:100%}
.slot .rm{position:absolute;top:1px;right:2px;background:none;border:none;cursor:pointer;color:rgba(255,255,255,0.3);font-size:11px;z-index:4;padding:1px 3px}
.slot .rm:hover{color:var(--red)}
.applied-buff{display:flex;align-items:center;gap:5px;padding:4px 8px;border-radius:6px;background:var(--bg4);margin-top:6px}
/* buff */
.buff-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.buff-card{background:var(--bg3);border:0.5px solid var(--border);border-radius:var(--radius);padding:9px;position:relative;cursor:default}
.buff-card-icon{font-size:20px;margin-bottom:3px}
.buff-card-name{font-size:12px;font-weight:500;margin-bottom:2px}
.buff-card-desc{font-size:10px;color:var(--text3);line-height:1.4}
.buff-empty{border:1.5px dashed rgba(255,255,255,0.08);background:transparent;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;min-height:70px;cursor:pointer}
.buff-empty:hover{border-color:var(--border2)}
.buff-empty span{font-size:11px;color:var(--text3)}
/* boss */
.boss-list{display:flex;flex-direction:column;gap:6px}
.boss-card{background:var(--bg3);border:0.5px solid var(--border);border-radius:var(--radius);padding:9px 10px}
.boss-hd{display:flex;align-items:center;gap:7px;margin-bottom:4px}
.boss-icon{width:32px;height:32px;border-radius:7px;overflow:hidden;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:500}
.boss-memo{font-size:11px;color:var(--text3);line-height:1.5;white-space:pre-wrap;word-break:keep-all}
/* char mgr list */
.erow{display:flex;align-items:center;gap:6px;padding:5px 0;border-bottom:0.5px solid var(--border)}
.erow:last-child{border-bottom:none}
.erow.unowned{opacity:0.38}
.own-cb{width:15px;height:15px;cursor:pointer;flex-shrink:0;accent-color:var(--accent)}
.mfb{width:28px;height:28px;border-radius:6px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:500}
.mimg{width:28px;height:28px;border-radius:6px;object-fit:cover;object-position:top;flex-shrink:0}
.dtog{padding:2px 6px;border:0.5px solid var(--border2);border-radius:6px;font-size:11px;cursor:pointer;background:var(--bg3);color:var(--text2);flex-shrink:0;font-family:inherit}
.dtog.on{background:var(--accent2);color:#fff;border-color:var(--accent)}
.filter-row{display:flex;gap:6px;margin-bottom:8px;flex-wrap:wrap;align-items:center}
.fbtn{padding:3px 9px;border:0.5px solid var(--border2);border-radius:20px;font-size:12px;cursor:pointer;background:var(--bg3);color:var(--text2);font-family:inherit}
.fbtn.on{background:var(--bg2);border-color:var(--accent);color:var(--text);font-weight:500}
.swatches{display:flex;gap:5px;flex-wrap:wrap}
.sw{width:19px;height:19px;border-radius:50%;cursor:pointer;border:2px solid transparent}
.sw.on{border-color:var(--text)}
.apills{display:flex;gap:5px;flex-wrap:wrap}
.ap{padding:3px 8px;border-radius:20px;font-size:12px;cursor:pointer;border:1.5px solid transparent;opacity:0.4;font-weight:500;font-family:inherit}
.ap.on{opacity:1;border-color:rgba(255,255,255,0.2)}
.saves-list{display:flex;flex-direction:column;gap:6px}
.si{display:flex;align-items:center;gap:7px;padding:8px 10px;border:0.5px solid var(--border);border-radius:var(--radius);background:var(--bg3)}
.mcgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(62px,1fr));gap:6px;margin-top:8px}
.mc{border:0.5px solid var(--border);border-radius:var(--radius);text-align:center;cursor:pointer;background:var(--bg3);position:relative;overflow:hidden;transition:border-color .15s}
.mc:hover{border-color:var(--border2)}
.mc.out{opacity:0.22;pointer-events:none}
.mc.s5{border-color:rgba(240,180,41,0.3)}
/* season edit row */
.season-row{display:flex;align-items:flex-start;gap:8px;padding:10px 0;border-bottom:0.5px solid var(--border)}
.season-row:last-child{border-bottom:none}
</style>
</head>
<body>

<div id="loginScreen">
  <div class="login-box">
    <h1>⚔️ 매트릭스 파티 편성</h1>
    <p>명조 워더링 웨이브<br>시즌별 파티 편성 관리</p>
    <button class="google-btn" onclick="signInGoogle()">
      <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google">
      Google로 로그인
    </button>
  </div>
</div>

<div id="app">
  <div class="top-bar">
    <h1>매트릭스 파티 편성</h1>
    <img class="user-avatar" id="userAvatar" src="" alt="">
    <button class="btn btn-sm" onclick="openCharMgr()"><i class="ti ti-users"></i> 공명자 관리</button>
    <button class="btn btn-sm" onclick="openSaves()"><i class="ti ti-folder"></i> 저장</button>
    <button class="btn btn-icon btn-sm" onclick="doSignOut()" title="로그아웃"><i class="ti ti-logout"></i></button>
  </div>

  <div class="season-bar" id="seasonBar"></div>

  <div id="noSeason" style="display:none;flex-direction:column;align-items:center;justify-content:center;padding:60px 0;gap:16px">
    <p style="color:var(--text3);font-size:14px">아직 등록된 시즌이 없어요</p>
    <button class="btn btn-accent" onclick="openSeasonMgr()"><i class="ti ti-plus"></i> 첫 시즌 추가하기</button>
  </div>

  <div class="main-layout" id="mainLayout" style="display:none">
    <div class="left-col">
      <div id="charPoolSection"></div>
      <div style="display:flex;gap:8px;align-items:center;margin:10px 0">
        <button class="btn btn-accent btn-sm" onclick="addParty()"><i class="ti ti-plus"></i> 파티 추가</button>
        <span id="info" style="font-size:12px;color:var(--text2)"></span>
      </div>
      <div class="parties-area" id="partiesArea"></div>
    </div>
    <div class="right-col">
      <div style="background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--radius2);padding:13px">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
          <span style="font-size:13px;font-weight:500">파티 버프</span>
          <button class="btn btn-sm btn-icon" onclick="openBuffMgr()"><i class="ti ti-settings"></i></button>
        </div>
        <div class="buff-grid" id="buffGrid"></div>
      </div>
      <div style="background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--radius2);padding:13px">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
          <span style="font-size:13px;font-weight:500">보스</span>
          <button class="btn btn-sm" onclick="openAddBoss()"><i class="ti ti-plus"></i> 추가</button>
        </div>
        <div class="boss-list" id="bossList"></div>
      </div>
    </div>
  </div>
</div>

<!-- 슬롯 선택 -->
<div class="modal-bg" id="slotModal">
  <div class="modal">
    <div style="display:flex;align-items:center;margin-bottom:6px">
      <span class="modal-title" id="slotTitle">캐릭터 선택</span>
      <button class="btn btn-sm" style="margin-left:auto" onclick="closeM('slotModal')">닫기</button>
    </div>
    <p style="font-size:11px;color:var(--text3);margin-bottom:2px">흐린 캐릭터는 이미 최대 배치됨</p>
    <div id="slotTiers"></div>
  </div>
</div>

<!-- 시즌 관리 -->
<div class="modal-bg" id="seasonMgrModal">
  <div class="modal">
    <div style="display:flex;align-items:center;margin-bottom:14px">
      <span class="modal-title">시즌 관리</span>
      <button class="btn btn-sm" style="margin-left:auto" onclick="closeM('seasonMgrModal')">닫기</button>
    </div>
    <!-- 새 시즌 추가 -->
    <p style="font-size:12px;color:var(--text2);margin-bottom:8px">새 시즌 추가</p>
    <div style="display:flex;flex-direction:column;gap:8px;margin-bottom:16px">
      <input class="field" id="newSName" placeholder="시즌 이름 (예: 시즌 1)">
      <div style="display:flex;gap:8px;align-items:center">
        <input class="field" id="newSStart" type="date" style="flex:1">
        <span style="color:var(--text3);font-size:13px;flex-shrink:0">~</span>
        <input class="field" id="newSEnd" type="date" style="flex:1">
      </div>
      <button class="btn btn-accent" style="justify-content:center" onclick="addSeason()"><i class="ti ti-plus"></i> 시즌 추가</button>
    </div>
    <!-- 기존 시즌 목록 -->
    <p style="font-size:12px;color:var(--text2);margin-bottom:8px">등록된 시즌</p>
    <div id="seasonList"></div>
  </div>
</div>

<!-- 시즌 편집 -->
<div class="modal-bg" id="seasonEditModal">
  <div class="modal-sm">
    <div style="display:flex;align-items:center;margin-bottom:14px">
      <span class="modal-title">시즌 편집</span>
      <button class="btn btn-sm" style="margin-left:auto" onclick="closeM('seasonEditModal')">닫기</button>
    </div>
    <div style="display:flex;flex-direction:column;gap:9px">
      <input class="field" id="editSName" placeholder="시즌 이름">
      <div style="display:flex;gap:8px;align-items:center">
        <input class="field" id="editSStart" type="date" style="flex:1">
        <span style="color:var(--text3);font-size:13px;flex-shrink:0">~</span>
        <input class="field" id="editSEnd" type="date" style="flex:1">
      </div>
      <button class="btn btn-accent" style="justify-content:center" onclick="saveSeasonEdit()"><i class="ti ti-device-floppy"></i> 저장</button>
    </div>
  </div>
</div>

<!-- 버프 관리 -->
<div class="modal-bg" id="buffMgrModal">
  <div class="modal">
    <div style="display:flex;align-items:center;margin-bottom:12px">
      <span class="modal-title">파티 버프 관리</span>
      <button class="btn btn-sm" style="margin-left:auto" onclick="closeM('buffMgrModal')">닫기</button>
    </div>
    <p style="font-size:12px;color:var(--text3);margin-bottom:10px">최대 4개. 각 파티에서 적용 버프를 선택할 수 있습니다.</p>
    <div id="buffEditList"></div>
    <div id="buffAddArea" style="margin-top:14px">
      <p style="font-size:13px;font-weight:500;margin-bottom:8px">버프 추가</p>
      <div style="display:flex;flex-direction:column;gap:7px">
        <input class="field" id="bName" placeholder="버프 이름 (예: 회절 피해 +30%)">
        <input class="field" id="bIcon" placeholder="아이콘 이모지 (예: ⚡🔥💧✨)">
        <textarea class="textarea" id="bDesc" placeholder="버프 설명" style="min-height:56px"></textarea>
        <button class="btn btn-accent" style="justify-content:center" onclick="addBuff()"><i class="ti ti-plus"></i> 추가</button>
      </div>
    </div>
  </div>
</div>

<!-- 버프 편집 -->
<div class="modal-bg" id="buffEditModal">
  <div class="modal-sm">
    <div style="display:flex;align-items:center;margin-bottom:12px">
      <span class="modal-title">버프 편집</span>
      <button class="btn btn-sm" style="margin-left:auto" onclick="closeM('buffEditModal')">닫기</button>
    </div>
    <div style="display:flex;flex-direction:column;gap:8px">
      <input class="field" id="ebName" placeholder="버프 이름">
      <input class="field" id="ebIcon" placeholder="아이콘 이모지">
      <textarea class="textarea" id="ebDesc" placeholder="버프 설명" style="min-height:56px"></textarea>
      <button class="btn btn-accent" style="justify-content:center" onclick="saveBuffEdit()"><i class="ti ti-device-floppy"></i> 저장</button>
    </div>
  </div>
</div>

<!-- 보스 추가/편집 -->
<div class="modal-bg" id="bossMgrModal">
  <div class="modal-sm">
    <div style="display:flex;align-items:center;margin-bottom:12px">
      <span class="modal-title" id="bossMgrTitle">보스 추가</span>
      <button class="btn btn-sm" style="margin-left:auto" onclick="closeM('bossMgrModal')">닫기</button>
    </div>
    <div style="display:flex;flex-direction:column;gap:9px">
      <input class="field" id="bossName" placeholder="보스 이름">

window.FB = {

  async loadChars(){
    const d = await getDoc(uDoc('ww','chars'));
    return d.exists() ? d.data().list.map(c=>({attr:'회절',owned:true,memo:'',...c})) : null;
  },
  async saveChars(list){ await setDoc(uDoc('ww','chars'),{list}); },
  async loadSeasons(){
    const q = query(uColl('ww','seasons'), orderBy('ts','asc'));
    const s = await getDocs(q);
    return s.docs.map(d=>({id:d.id,...d.data()}));
  },
  async addSeason(data){
    const ref = await addDoc(uColl('ww','seasons'),{...data, ts:serverTimestamp()});
    return ref.id;
  },
  async updateSeason(id,data){ await updateDoc(uDoc('ww','seasons',id), data); },

};

onAuthStateChanged(auth, async user => {

});

async function deleteSeason(sid){

  await window.FB.deleteSeason(sid);

  if(curSid===sid){
    curSid = seasons[0]?.id||null;
    if(curSid) await loadSeasonData(curSid);

function cc(c){ return (c.attr&&ATTRS[c.attr])?ATTRS[c.attr]:COLS[c.color%COLS.length]; }
function mkBg(c,w,h){
  const col=cc(c);
  const badge=c.attr&&ATTRS[c.attr]?`<span class="attr-badge" style="background:${ATTRS[c.attr].bg};color:${ATTRS[c.attr].text}">${c.attr}</span>`:'';
  const fb=`<div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:${Math.floor(w*.28)}px;font-weight:500;background:${col.bg};color:${col.text}">${c.name.slice(0,2)}</div>`;
  if(c.img) return `<div style="width:${w}px;height:${h}px;position:relative;overflow:hidden;background:${col.bg}">${fb}<img src="${c.img}" style="position:absolute;inset:0;width:100%;height:100%;object-fit:cover;object-position:top center;z-index:1" onerror="this.style.display='none'"><div style="position:absolute;inset:0;z-index:2;pointer-events:none">${badge}</div></div>`;
  return `<div style="width:${w}px;height:${h}px;position:relative;overflow:hidden;background:${col.bg};display:flex;align-items:center;justify-content:center;font-size:${Math.floor(w*.28)}px;font-weight:500;color:${col.text}">${c.name.slice(0,2)}${badge}</div>`;
}
function getUsed(){ const u={}; parties.forEach(p=>p.slots.forEach(s=>{if(s!=null)u[s]=(u[s]||0)+1;})); return u; }

function renderPool(){
  const used=getUsed(); let html='';
  const rT=(fn,lbl,lc)=>{
    if(!chars.some(c=>fn(c)&&c.owned)) return;
    html+=`<p class="sec-title"><span style="color:${lc}">${lbl}</span></p><div class="char-grid">`;
    chars.forEach((c,i)=>{
      if(!fn(c)||!c.owned) return;
      const ex=(used[i]||0)>=(c.dupe?2:1);
      html+=`<div class="char-card${c.star5?' star5':''}${ex?' exhausted':''}" onclick="tip(${i})">
        ${c.star5?'<div class="star5-corner"></div>':''}${c.dupe?'<span class="dupe-tag">×2</span>':''}
        ${c.memo?'<div class="memo-dot"></div>':''}
        <div class="portrait-wrap">${mkBg(c,63,63)}</div>
        <div class="char-name">${c.name}</div>
      </div>`;
    });
    html+='</div>';
  };
  rT(c=>c.star5,'★5','var(--gold)');
  rT(c=>!c.star5,'★4','var(--text2)');
  document.getElementById('charPoolSection').innerHTML=html||'<p style="font-size:13px;color:var(--text3);padding:8px 0">보유한 공명자가 없습니다</p>';
}

  const L={list:'목록',add:'추가'};
  document.querySelectorAll('#charMgrModal .tab').forEach(el=>el.classList.toggle('active',el.textContent.trim()===L[t]));
  document.querySelectorAll('#charMgrModal .pane').forEach(el=>el.classList.remove('active'));
  document.getElementById('cpane-'+t).classList.add('active');
  if(t==='list')renderCharEditList();if(t==='add')renderPills('n');
}

// ── 파티 저장 ──
function openSaves(){ renderSavesList(); document.getElementById('savesModal').classList.add('open'); }
async function doSave(){
  const name=document.getElementById('saveName').value.trim()||`편성 ${new Date().toLocaleDateString('ko')}`;
  await window.FB.addSave({name,parties:JSON.parse(JSON.stringify(parties)),seasonId:curSid,date:new Date().toLocaleString('ko')});
  document.getElementById('saveName').value='';renderSavesList();showToast(`"${name}" 저장됨`);
}
async function renderSavesList(){
  const saves=await window.FB.loadSaves();
  const list=document.getElementById('savesList');
  if(!saves.length){list.innerHTML='<p style="font-size:13px;color:var(--text3)">저장된 편성 없음</p>';return;}
  list.innerHTML=saves.map(s=>{
    const sn=seasons.find(x=>x.id===s.seasonId);
    return `<div class="si">
      <div style="flex:1;min-width:0"><div style="font-size:13px">${s.name}</div><div style="font-size:11px;color:var(--text3)">${s.date}${sn?' · '+sn.name:''}</div></div>
      <button class="btn btn-sm btn-icon" onclick="loadSave('${s.id}')"><i class="ti ti-upload"></i></button>
      <button class="btn btn-sm btn-icon" onclick="delSave('${s.id}')"><i class="ti ti-trash"></i></button>
    </div>`;
  }).join('');
}
async function loadSave(id){
  const saves=await window.FB.loadSaves();const s=saves.find(x=>x.id===id);
  if(s){parties=s.parties;closeM('savesModal');await saveSeason();renderAll();showToast('불러옴');}
}
async function delSave(id){ await window.FB.deleteSave(id);renderSavesList(); }

// ── 유틸 ──
function closeM(id){ document.getElementById(id).classList.remove('open'); }
function showToast(msg){ const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2200); }

document.querySelectorAll('.modal-bg').forEach(m=>m.addEventListener('click',e=>{ if(e.target===m) m.classList.remove('open'); }));
</script>
</body>
</html>
